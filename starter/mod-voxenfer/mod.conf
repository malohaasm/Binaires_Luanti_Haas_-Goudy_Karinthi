name = voxenfer
author = Philippe ROUSSILLE <roussille@3il.fr>
title = Voxenfer : pont jeu ↔ micro-services (illustration)
description = Mod FOURNI, non noté. Relie le serveur Luanti à votre écosystème de micro-services (comptes, économie, boutique, classements, modération, événements, monde) via la gateway, dans les deux sens : le jeu appelle vos services (événements), et vos services font agir le jeu (files d'actions). But : rendre concret « à quoi sert mon service ». Vous n'avez pas à le modifier ni à le rendre.
